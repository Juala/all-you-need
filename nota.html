<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nota Pembelian | ROJA STORE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0; padding:0;
}
.container {
    max-width:420px;
    margin:30px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
    position:relative;
}
.header {
    text-align:center;
    margin-bottom:10px;
}
h2 {
    margin:0;
}
.data p {
    margin:6px 0;
    font-size:15px;
}
.buttons {
    text-align:center;
    margin-top:15px;
}
button {
    padding:10px 18px;
    margin:5px;
    border:none;
    background:#4CAF50;
    color:#fff;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}
#editBtn {
    background:#ff9800;
}
#backBtn {
    background:#777;
    width:180px;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="container" id="captureArea">
    <div class="header">
        <h2>ROJA STORE</h2>
        <small>STRUK PEMBELIAN</small>
    </div>

    <div class="data">
        <p><b>Nama:</b> <span id="nama"></span></p>
        <p><b>Layanan:</b> <span id="layanan"></span></p>
        <p><b>Harga:</b> <span id="harga"></span></p>
        <p><b>Kode Transaksi:</b> <span id="kode"></span></p>
        <p><b>Tanggal:</b> <span id="tanggal"></span></p>
    </div>
</div>

<!-- TOMBOL (tidak ikut screenshot) -->
<div class="buttons no-capture">
    <button id="saveBtn">Cetak Struk</button>
    <button id="editBtn" onclick="window.location.href='payment.html'">Edit Struk</button>
    <button id="backBtn" onclick="window.location.href='index.html'">Kembali</button>
</div>

<script>
// mengambil data dari URL
const params = new URLSearchParams(window.location.search);
document.getElementById("nama").innerText = params.get("nama");
document.getElementById("layanan").innerText = params.get("layanan");
document.getElementById("harga").innerText = params.get("harga");
document.getElementById("kode").innerText = params.get("kode");
document.getElementById("tanggal").innerText = params.get("tanggal");

// tombol save PNG dan kirim WA
document.getElementById("saveBtn").addEventListener("click", function () {
    html2canvas(document.getElementById("captureArea"), {
        scale: 3,
        backgroundColor: "#ffffff",
        ignoreElements: (el) => el.classList.contains("no-capture")
    }).then(canvas => {
        canvas.toBlob(function(blob) {
            const file = new File([blob], "Struk-ROJA.png", { type: "image/png" });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({
                    files: [file],
                    title: "Struk Pembelian ROJA STORE",
                    text: "Berikut struk pembelian dari ROJA STORE"
                }).catch(console.error);
            } else {
                const link = document.createElement("a");
                link.download = "Struk-ROJA.png";
                link.href = canvas.toDataURL();
                link.click();
                alert("HP tidak mendukung share WA langsung, file akan tersimpan.");
            }
        });
    });
});
</script>

</body>
</html>
