<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Struk Pembelian | ROJA STORE</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#ffffff; margin:0; padding:15px; }
.label { font-weight:bold; margin-top:10px; }
.value { margin-top:3px; }
button { padding:10px 14px; border:none; border-radius:6px; cursor:pointer; font-size:15px; }

#editModal{
  display:none; position:fixed; left:0; top:0; width:100%; height:100%;
  background:rgba(0,0,0,0.5); justify-content:center; align-items:center;
}
.modal-box{
  background:#fff; padding:20px; border-radius:10px; width:280px;
}
input{ width:100%; padding:10px; margin-top:10px; border:1px solid #aaa; border-radius:6px; }
</style>
</head>

<body>

<h2 style="text-align:center;">STRUK PEMBELIAN</h2>

<div id="strukSection">
    <div class="label">Kode Transaksi</div>
    <div class="value" id="kodeTransaksi"></div>

    <div class="label">Nama Pembeli</div>
    <div class="value" id="namaPembeli"></div>

    <div class="label">Produk</div>
    <div class="value" id="produk"></div>

    <div class="label">Harga</div>
    <div class="value" id="hargaView"></div>
</div><br>

<div style="display:flex; gap:10px;">
    <button onclick="window.print()" style="background:#2196F3;color:white;">Cetak Struk</button>
    <button id="editBtn" style="background:#ff9800;color:white;">Edit Struk</button>
</div>

<br>
<button onclick="sendToWA()" style="width:100%;background:#4CAF50;color:white;">
    Kirim ke WhatsApp
</button>


<!-- MODAL -->
<div id="editModal">
    <div class="modal-box">
        <h3>Edit Harga Produk</h3>
        <input type="number" id="editHarga">
        <button onclick="simpanHarga()" style="background:#4CAF50;color:white;margin-top:10px;width:100%;">Simpan</button>
    </div>
</div>


<script>
// Firebase Config
var firebaseConfig = {
  apiKey: "AIzaSyDpj7udfBLEqlloEqidlSJYHt-2icTOGCw",
  authDomain: "database-jualan.firebaseapp.com",
  databaseURL: "https://database-jualan-default-rtdb.firebaseio.com",
  projectId: "database-jualan",
  storageBucket: "database-jualan.firebasestorage.app",
  messagingSenderId: "766732892106",
  appId: "1:766732892106:web:cd223204bfbb529599c133",
};
firebase.initializeApp(firebaseConfig);

const params = new URLSearchParams(window.location.search);
const idTransaksi = params.get("id");

let harga = 0;
let nomorWA = "";

// Ambil data struk dari database
firebase.database().ref("orders/" + idTransaksi).once("value").then(snap => {
    const data = snap.val();

    document.getElementById("kodeTransaksi").innerText = data.kode;
    document.getElementById("namaPembeli").innerText = data.nama;
    document.getElementById("produk").innerText = data.produk;
    document.getElementById("hargaView").innerText = "Rp " + data.harga;

    harga = data.harga;
    nomorWA = data.wa;
});

// Buka popup edit
document.getElementById("editBtn").addEventListener("click", () => {
    document.getElementById("editModal").style.display = "flex";
    document.getElementById("editHarga").value = harga;
});

// Simpan perubahan harga
function simpanHarga() {
    const hargaBaru = document.getElementById("editHarga").value;

    firebase.database().ref("orders/" + idTransaksi).update({
        harga: hargaBaru
    }).then(() => {
        alert("Harga berhasil diperbarui!");
        location.reload();
    });
}

// Kirim struk PNG ke WA
function sendToWA(){
    html2canvas(document.getElementById("strukSection")).then(canvas => {
        canvas.toBlob(function(blob) {
            const file = new File([blob], "Struk-ROJA.png", { type: "image/png" });
            const formData = new FormData();
            formData.append("file", file);

            fetch(`https://API_WHATSAPP_KAMU/send-media?number=${nomorWA}`, {
                method:"POST",
                body:formData
            }).then(()=>alert("Struk berhasil dikirim ke WhatsApp!"))
            .catch(()=>alert("Gagal mengirim struk"));
        });
    });
}
</script>

</body>
</html>
