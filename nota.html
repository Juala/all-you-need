<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Struk Pembelian | ROJA STORE</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{font-family:Poppins, Arial, sans-serif;background:#f4f7fc;margin:0;padding:0;}
.container{max-width:400px;margin:40px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.15);}
h2{text-align:center;margin-bottom:20px;}
.label{font-weight:bold;color:#444;margin-top:8px;}
.value{margin-top:3px;color:#222;}
.btn{width:100%;padding:12px;border:none;border-radius:8px;margin-top:15px;font-size:16px;cursor:pointer;}
.btn-print{background:#2196F3;color:#fff;}
.btn-wa{background:#4CAF50;color:#fff;}
.btn-edit{background:#ff9800;color:#fff;}

#editModal{display:none;position:fixed;left:0;top:0;width:100%;height:100%;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);}
.modal-box{background:#fff;padding:20px;border-radius:12px;width:300px;}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin-top:10px;}
</style>
</head>

<body>

<div class="container" id="strukSection">
    <h2>STRUK PEMBELIAN</h2>
    <div class="label">Kode Transaksi</div>
    <div class="value" id="kodeTransaksi"></div>

    <div class="label">Nama Pembeli</div>
    <div class="value" id="namaPembeli"></div>

    <div class="label">Produk</div>
    <div class="value" id="produk"></div>

    <div class="label">Harga</div>
    <div class="value" id="hargaView"></div>
</div>

<div style="max-width:400px;margin:auto;display:flex;justify-content:space-between;">
    <button class="btn btn-print" onclick="window.print()">Cetak Struk</button>
    <button class="btn btn-edit" id="editBtn">Edit Struk</button>
</div>

<button class="btn btn-wa" onclick="sendToWA()">Kirim ke WhatsApp</button>

<!-- MODAL EDIT -->
<div id="editModal">
    <div class="modal-box">
        <h3>Edit Harga Produk</h3>
        <input type="number" id="editHarga">
        <button class="btn" style="background:#4CAF50;color:white;" onclick="simpanHarga()">Simpan</button>
    </div>
</div>

<script>
// Firebase Config
var firebaseConfig = {
  apiKey: "AIzaSyDpj7udfBLEqlloEqidlSJYHt-2icTOGCw",
  authDomain: "database-jualan.firebaseapp.com",
  databaseURL: "https://database-jualan-default-rtdb.firebaseio.com",
  projectId: "database-jualan",
  storageBucket: "database-jualan.firebasestorage.app",
  messagingSenderId: "766732892106",
  appId: "1:766732892106:web:cd223204bfbb529599c133",
};
firebase.initializeApp(firebaseConfig);

const params = new URLSearchParams(window.location.search);
const idTransaksi = params.get("id");
let harga = 0;
let nomorWA = "";

// Ambil Data Struk
firebase.database().ref("orders/" + idTransaksi).once("value").then(snap => {
    const data = snap.val();

    document.getElementById("kodeTransaksi").innerText = data.kode;
    document.getElementById("namaPembeli").innerText = data.nama;
    document.getElementById("produk").innerText = data.produk;
    document.getElementById("hargaView").innerText = "Rp " + data.harga;

    harga = data.harga;
    nomorWA = data.wa;
});

// Tombol Edit Modal
document.getElementById("editBtn").addEventListener("click", () => {
    document.getElementById("editModal").style.display = "flex";
    document.getElementById("editHarga").value = harga;
});

// Simpan harga baru
function simpanHarga() {
    const hargaBaru = document.getElementById("editHarga").value;

    firebase.database().ref("orders/" + idTransaksi).update({
        harga: hargaBaru
    }).then(() => {
        alert("Harga berhasil diperbarui!");
        location.reload();
    });
}

// Kirim PNG ke WhatsApp
function sendToWA() {
    html2canvas(document.getElementById("strukSection")).then(canvas => {
        canvas.toBlob(async function(blob) {
            const file = new File([blob], "Struk-ROJA.png", { type: "image/png" });
            const formData = new FormData();
            formData.append("file", file);

            fetch(`https://API_WHATSAPP_KAMU/send-media?number=${nomorWA}`, {
                method: "POST",
                body: formData
            })
            .then(()=> alert("Struk berhasil dikirim ke WhatsApp!"))
            .catch(()=> alert("Gagal mengirim struk"));
        });
    });
}
</script>
</body>
</html>
