<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nota Pembelian</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f1f1f1; margin:0; padding:20px; }
.container {
    max-width:400px; margin:auto; background:#fff; padding:20px; border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1); position:relative; overflow:hidden;
}
h2 { margin:0 0 10px; text-align:center; }

.btn-area {
    display:flex; justify-content:center; gap:10px;
    margin-top:15px; width:100%;
}
button {
    padding:10px 15px; border:none; border-radius:8px; cursor:pointer;
    font-size:14px; font-weight:bold; background:#007bff; color:#fff;
}
#kembaliBtn { background:#444; }
#editBtn { background:#28a745; }

#qrWatermark {
    position:absolute; bottom:10px; right:10px; width:70px; opacity:0.75;
}

.hidden { display:none !important; }
</style>
</head>
<body>

<div class="container" id="notaBox">
    <h2>BUKTI PEMBELIAN</h2>
    <p><b>Order ID:</b> <span id="orderId"></span></p>
    <p><b>Produk:</b> <span id="product"></span></p>
    <p><b>Harga:</b> <span id="price"></span></p>
    <p><b>Status:</b> <span id="status"></span></p>

    <div id="qrWatermark"></div>
</div>

<div class="btn-area" id="buttonGroup">
    <button id="downloadBtn">Cetak Struk</button>
    <button id="editBtn">Edit Struk</button>
    <button id="kembaliBtn">Kembali</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const orderId = params.get("orderId");

document.getElementById("orderId").textContent = orderId;
document.getElementById("product").textContent = "CapCut Pro 1 Bulan (G7)";
document.getElementById("price").textContent = "Rp 35.000";
document.getElementById("status").textContent = "Sukses";

// Generate QR watermark (dinamis)
const notaLink = `https://juala.github.io/all-you-need/nota.html?orderId=${orderId}`;
new QRCode(document.getElementById("qrWatermark"), {
    text: notaLink,
    width: 70,
    height: 70
});

// Hilangkan tombol saat dibuka dari hasil scan / device lain
if (document.referrer === "" && !sessionStorage.getItem("openedFromMainDevice")) {
    document.getElementById("buttonGroup").classList.add("hidden");
}

// Tombol kembali
document.getElementById("kembaliBtn").onclick = () => {
    window.location.href = "index.html";
};

// Tombol edit struk (opsional ubah link sesuai kebutuhan)
document.getElementById("editBtn").onclick = () => {
    window.location.href = `payment.html?orderId=${orderId}`;
};

// Cetak struk jadi PNG & kirim via WhatsApp bebas nomor
document.getElementById("downloadBtn").onclick = () => {
    document.getElementById("buttonGroup").classList.add("hidden");

    html2canvas(document.getElementById("notaBox"), {scale:3}).then(canvas => {
        const image = canvas.toDataURL("image/png");
        const fileName = `STRUK-${orderId}.png`;

        const a = document.createElement("a");
        a.href = image;
        a.download = fileName;
        a.click();

        const waSend = `https://wa.me/?text=Struk Pembelian%0AOrder ID: ${orderId}%0A(terlampir gambar struk)%0A${notaLink}`;
        window.location.href = waSend;

        setTimeout(() => {
            document.getElementById("buttonGroup").classList.remove("hidden");
        }, 1000);
    });
};

sessionStorage.setItem("openedFromMainDevice", "true");
</script>

</body>
</html>
