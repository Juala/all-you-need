<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order Produk</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f5f7; padding: 20px; }
.container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 0 12px rgba(0,0,0,0.2); }
input, select { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 8px; }
button { margin-top: 15px; padding: 12px; width: 100%; background:#007bff; color:#fff; border:none; border-radius:10px; font-size:18px; cursor:pointer;}
button:hover { background:#005fcc; }
.hidden { display:none; }
</style>
</head>
<body>

<div class="container">
  <h2>Form Pemesanan</h2>

  <label>Pilih Produk</label>
  <select id="produk" onchange="showFields()">
    <option value="">-- Pilih Produk --</option>
    <option value="Followers">Followers</option>
    <option value="App Premium">App Premium</option>
  </select>

  <div id="followersFields" class="hidden">
    <label>Jumlah Followers</label>
    <select id="jumlah">
      <option value="1000">1.000 Followers</option>
      <option value="2000">2.000 Followers</option>
      <option value="5000">5.000 Followers</option>
      <option value="10000">10.000 Followers</option>
    </select>

    <label>Link Profil</label>
    <input type="text" id="linkprofil" placeholder="https://instagram.com/username" />
  </div>

  <div id="appFields" class="hidden">
    <label>Nomor WhatsApp</label>
    <input type="text" id="nomorapp" placeholder="08xxxxxxxxxx" />
  </div>

  <button onclick="submitOrder()">Order Sekarang</button>
</div>

<script>
function showFields() {
  const produk = document.getElementById("produk").value;
  document.getElementById("followersFields").classList.add("hidden");
  document.getElementById("appFields").classList.add("hidden");

  if (produk === "Followers") {
    document.getElementById("followersFields").classList.remove("hidden");
  } else if (produk === "App Premium") {
    document.getElementById("appFields").classList.remove("hidden");
  }
}

function submitOrder() {
  const produk = document.getElementById("produk").value;
  let jumlah = "";
  let linkprofil = "";
  let nomor = "";

  if (!produk) return alert("Silakan pilih produk dulu!");

  const idbayar = "PAY-" + Date.now(); // Generate ID otomatis

  if (produk === "Followers") {
    jumlah = document.getElementById("jumlah").value;
    linkprofil = document.getElementById("linkprofil").value;
    if (!linkprofil) return alert("Masukkan link profil Instagram!");
  } else {
    nomor = document.getElementById("nomorapp").value;
    jumlah = "-";
    linkprofil = "-";
    if (!nomor) return alert("Masukkan nomor WhatsApp!");
  }

  fetch("https://script.google.com/macros/s/AKfycby0xnAcL3pWRSPeGwjz4FJkQsUHnrYeCkjcWR5u1EHz3_Nl7XwvQPaMqouYUC0MKVYZyQ/exec", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ produk, jumlah, linkprofil, nomor, idbayar })
  })
  .then(res => res.json())
  .then(data => {
     alert("Order berhasil! Silakan lanjut pembayaran QRIS.");
     window.location.href = "qris.png"; // QRIS file kamu
     setTimeout(() => {
       window.location.href = `https://wa.me/6282262642007?text=Halo%20admin,%20saya%20sudah%20bayar.%0AID%20Pembayaran:%20${idbayar}%0AProduk:%20${produk}%0AJumlah:%20${jumlah}%0ALink/WA:%20${linkprofil || nomor}`;
     }, 5000);
  });
}
</script>

</body>
</html>
