<form id="orderForm">
  <label>Jenis Produk:</label>
  <select id="product" required>
    <option value="followers">Followers</option>
    <option value="app-prem">App Premium</option>
  </select>

  <div id="followersInput" style="display:none">
    <label>Jumlah Followers:</label>
    <input type="number" id="jumlah" placeholder="Masukkan jumlah followers" />
    <label>Link Profil:</label>
    <input type="text" id="profil" placeholder="Masukkan link profil" />
  </div>

  <div id="appInput" style="display:none">
    <label>Nomor Telepon:</label>
    <input type="text" id="phone" placeholder="Masukkan nomor telepon" />
  </div>

  <button type="submit">Order Sekarang</button>
</form>

<script>
document.getElementById("product").addEventListener("change", function () {
  if (this.value === "followers") {
    document.getElementById("followersInput").style.display = "block";
    document.getElementById("appInput").style.display = "none";
  } else {
    document.getElementById("followersInput").style.display = "none";
    document.getElementById("appInput").style.display = "block";
  }
});

document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  const product = document.getElementById("product").value;
  const jumlah = document.getElementById("jumlah").value;
  const profil = document.getElementById("profil").value;
  const phone = document.getElementById("phone").value;

  // pindah halaman dengan membawa data
  const url = `payment.html?product=${product}&jumlah=${jumlah}&profil=${profil}&phone=${phone}`;
  window.location.href = url;
});
</script>
