<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Order Followers & Premium App</title>
<style>
    body { font-family: Arial, sans-serif; background: #f1f3f8; padding: 20px; }
    .box { background: #fff; padding: 20px; border-radius: 12px; max-width: 600px; margin: auto; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; }
    label { font-weight: bold; margin-top: 15px; display: block; }
    select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; }
    #harga { font-size: 22px; text-align: center; font-weight: bold; margin-top: 15px; color: #0a7c1a; }
    button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; font-size: 18px; border-radius: 10px; margin-top: 20px; cursor: pointer; }
    button:hover { background: #0056b3; }
</style>
</head>

<body>

<div class="box">
<h2>Order Followers & App Premium</h2>

<label>Pilih Produk:</label>
<select id="product" onchange="updateOptions()">
    <option value="">-- Pilih Produk --</option>
    <option value="ig_followers">Followers Instagram</option>
    <option value="tt_followers">Followers TikTok</option>
    <option value="ig_likes">Like Instagram</option>
    <option value="tt_likes">Like TikTok</option>
    <option value="app_premium">App Premium</option>
</select>

<label>Pilih Jumlah:</label>
<select id="jumlah" onchange="updateHarga()">
    <option value="">-- Pilih Jumlah --</option>
</select>

<label>Username / Link Akun:</label>
<input type="text" id="username" placeholder="Masukkan username / link akun">

<p id="harga">Total: Rp 0</p>

<button onclick="orderNow()">Order Sekarang</button>
</div>

<script>
const hargaList = {
    ig_followers: {100:11000,200:22000,300:33000,400:44000,500:55000,1000:110000,2000:220000,5000:550000,10000:1100000},
    tt_followers: {100:10000,200:20000,300:30000,400:40000,500:50000,1000:100000,2000:200000,5000:500000,10000:1000000},
    ig_likes: {100:5000,200:10000,300:15000,400:20000,500:25000,1000:50000,2000:100000,5000:250000,10000:500000},
    tt_likes: {100:6000,200:12000,300:18000,400:24000,500:30000,1000:60000,2000:120000,5000:300000,10000:600000},
    app_premium: {
        "Netflix 1 Bulan":40000,"Spotify Premium 1 Bulan":14000,"Gemini 1thn + 2TB":35000,
        "AM Premium 1 Tahun":7000,"YouTube Premium 1 Bulan":10000,"Capcut PRO 1 Bulan":20000,
        "Gemini Premium 1thn + 2TB":35000,"GPT Premium 1 Bulan":30000,"Canva Premium 1 Bulan":5000
    }
};

function updateOptions() {
    const p = document.getElementById("product").value;
    const jumlah = document.getElementById("jumlah");
    jumlah.innerHTML = '<option value="">-- Pilih Jumlah --</option>';

    for (let key in hargaList[p]) {
        jumlah.innerHTML += `<option value="${key}">${key}</option>`;
    }
    updateHarga();
}

function updateHarga() {
    const p = document.getElementById("product").value;
    const j = document.getElementById("jumlah").value;
    const price = hargaList[p][j] || 0;
    document.getElementById("harga").innerText = "Total: Rp " + price.toLocaleString("id-ID");
}

function orderNow() {
    const p = document.getElementById("product").value;
    const j = document.getElementById("jumlah").value;
    const u = document.getElementById("username").value;
    const price = hargaList[p][j];

    if (!p || !j || !u) return alert("Lengkapi data terlebih dahulu");

    const orderID = "ROJAID-" + Math.floor(Math.random()*90000+10000);

    const params = new URLSearchParams({
        product:p, jumlah:j, username:u, harga:price, id:orderID
    });

    window.location.href = "payment.html?" + params.toString();
}
</script>

</body>
</html>
