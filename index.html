<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Layanan Sosmed</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h2>Order Layanan Sosial Media</h2>

<form id="orderForm">

<!-- PILIH PRODUK -->
<div class="form-group">
<label for="product">Pilih Produk</label>
<select id="product" name="product" required>
<option value="">-- Pilih Produk --</option>

<option value="Followers Instagram|10.000">Followers Instagram</option>
<option value="Followers TikTok|9.000">Followers TikTok</option>
<option value="Like Instagram|7.000">Like Instagram</option>
<option value="Like TikTok|7.000">Like TikTok</option>
<option value="Jam Tayang YouTube|50.000">Jam Tayang YouTube</option>

<!-- APP PREMIUM -->
<option value="Canva Pro|35.000">Canva Pro</option>
<option value="CapCut Pro|30.000">CapCut Pro</option>
<option value="InShot Pro|25.000">InShot Pro</option>
<option value="VN Pro|25.000">VN Pro</option>
<option value="Netflix Premium|40.000">Netflix Premium</option>
<option value="Disney+ Hotstar|35.000">Disney+ Hotstar</option>
<option value="Spotify Premium|25.000">Spotify Premium</option>
<option value="YouTube Premium|30.000">YouTube Premium</option>

</select>
</div>

<!-- USERNAME -->
<div class="form-group">
<label for="username">Username / Link Akun</label>
<input type="text" id="username" name="username" placeholder="Masukkan username" required>
</div>

<!-- JUMLAH -->
<div class="form-group" id="qtyGroup" style="display:none;">
<label for="quantity">Jumlah</label>
<input type="number" id="quantity" name="quantity" placeholder="Masukkan jumlah" min="1">
</div>

<!-- TOTAL BAYAR -->
<p id="totalDisplay" style="display:none; font-weight:bold; font-size:18px; margin-top:10px;"></p>

<button type="submit" class="btn">Order Sekarang</button>
</form>
</div>

<script>
// ambil elemen html
const productSelect = document.getElementById("product");
const qtyGroup = document.getElementById("qtyGroup");
const quantityInput = document.getElementById("quantity");
const totalDisplay = document.getElementById("totalDisplay");

productSelect.addEventListener("change", () => {
    qtyGroup.style.display = productSelect.value !== "" ? "block" : "none";
    totalDisplay.style.display = "none";
    quantityInput.value = "";
});

quantityInput.addEventListener("input", () => {
    const [name, price] = productSelect.value.split("|");
    const qty = Number(quantityInput.value);
    const total = qty * parseInt(price.replace(/\./g, ""));
    totalDisplay.innerHTML = `Total Bayar: <b>Rp ${total.toLocaleString("id-ID")}</b>`;
    totalDisplay.style.display = "block";
});

// kirim data ke payment.html
document.getElementById("orderForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const [productName, productPrice] = productSelect.value.split("|");
    const username = document.getElementById("username").value;
    const qty = quantityInput.value;

    window.location.href = `payment.html?product=${encodeURIComponent(productName)}&price=${productPrice}&username=${encodeURIComponent(username)}&qty=${qty}`;
});
</script>

</body>
</html>
