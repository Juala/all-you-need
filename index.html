<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Layanan</title>

<style>
    body { margin:0; background:#0e0f12; color:#fff; font-family: "Poppins", sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
    .card {
        background: linear-gradient(145deg, #1a1c20, #111315);
        padding: 35px;
        width: 420px;
        border-radius: 18px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        text-align:center;
        border:1px solid #2a2d33;
    }
    h2 { font-size:26px; margin-bottom:15px; font-weight:700; }
    label { text-align:left; width:100%; display:block; margin-top:18px; font-weight:500; }
    select, input {
        width:100%; padding:12px; margin-top:5px;
        background:#232528; color:#fff; border:none; border-radius:12px;
        font-size:15px;
    }
    select:focus, input:focus { outline: 2px solid #3498db; }
    .price-box {
        margin-top:20px; padding:15px;
        background:#111315; border:1px solid #2b2e33;
        border-radius:12px; display:none; font-size:19px; font-weight:600;
    }
    .btn {
        margin-top:25px; width:100%;
        padding:14px; background:#3498db; color:#fff; font-size:18px;
        border-radius:12px; cursor:pointer; border:none; transition:.3s;
        font-weight:600;
    }
    .btn:hover { background:#2176b8; }
</style>
</head>

<body>
<div class="card">
    <h2>🛒 Order Layanan</h2>

    <label>Pilih Layanan</label>
    <select id="service">
        <option value="">-- Pilih Produk --</option>
        <option value="followers">Followers Instagram</option>
        <option value="premium">App Premium</option>
    </select>

    <div id="followers-box" style="display:none;">
        <label>Pilih Jumlah Followers</label>
        <select id="followers">
            <option value="10000">10.000 Followers - Rp 10.000</option>
            <option value="20000">20.000 Followers - Rp 20.000</option>
            <option value="50000">50.000 Followers - Rp 50.000</option>
        </select>

        <label>Link Profil Instagram</label>
        <input type="text" id="link" placeholder="https://instagram.com/username">
    </div>

    <div id="premium-box" style="display:none;">
        <label>Nomor WhatsApp</label>
        <input type="text" id="phone" placeholder="08xxxx">
    </div>

    <div class="price-box" id="price-box">
        Total Pembayaran: <b id="total">Rp 0</b>
    </div>

    <button class="btn" onclick="goPayment()">Order Sekarang</button>
</div>

<script>
const service = document.getElementById("service");
const followersBox = document.getElementById("followers-box");
const premiumBox = document.getElementById("premium-box");
const priceBox = document.getElementById("price-box");
const followersSelect = document.getElementById("followers");
const totalPrice = document.getElementById("total");

service.addEventListener("change", () => {
    followersBox.style.display = service.value === "followers" ? "block" : "none";
    premiumBox.style.display = service.value === "premium" ? "block" : "none";
    priceBox.style.display = service.value ? "block" : "none";
    updatePrice();
});

followersSelect.addEventListener("change", updatePrice);

function updatePrice() {
    let price = 0;
    if (service.value === "followers") {
        price = Number(followersSelect.value);
    } else if (service.value === "premium") {
        price = 15000; // harga app premium
    }
    totalPrice.textContent = "Rp " + price.toLocaleString("id-ID");
}

function goPayment() {
    const selected = service.value;
    let price = selected === "followers" ? followersSelect.value : 15000;
    let data = {
        service: selected,
        followers: selected === "followers" ? followersSelect.value : "",
        link: selected === "followers" ? document.getElementById("link").value : "",
        phone: selected === "premium" ? document.getElementById("phone").value : "",
        price: price
    };
    localStorage.setItem("orderData", JSON.stringify(data));
    window.location.href = "payment.html";
}
</script>

</body>
</html>
