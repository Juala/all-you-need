<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | ROJA STORE</title>
<style>
body {font-family:Poppins,Arial,sans-serif;background:#f4f7fc;margin:0;padding:0;}
.container {max-width:500px;margin:50px auto;background:#fff;padding:25px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{text-align:center;font-weight:700;margin-bottom:15px;color:#2d2d2d;}
.info-box {margin-top:20px;padding:15px;border-radius:10px;background:#eef3ff;border:1px solid #cdd8ff;}
.value {font-weight:bold;color:#004aad}
button{background:#007bff;width:100%;padding:14px;color:white;border:none;border-radius:10px;font-size:17px;font-weight:600;margin-top:18px;cursor:pointer;}
button:hover{background:#005fcc;}
.link {text-align:center;margin-top:18px;font-size:15px;}
</style>
</head>

<body>
<div class="container">
<h2>Konfirmasi Pembayaran</h2>

<div class="info-box">
<p><strong>Order ID:</strong> <span id="orderId" class="value"></span></p>
<p><strong>Produk:</strong> <span id="produk" class="value"></span></p>
<p><strong>Jumlah:</strong> <span id="jumlah" class="value"></span></p>
<p><strong>Username / Nomor HP:</strong> <span id="username" class="value"></span></p>
<p><strong>Total Bayar:</strong> <span id="harga" class="value"></span></p>
</div>

<div style="text-align:center;margin-top:15px">
<p>Silakan scan QRIS berikut untuk melakukan pembayaran</p>
<img src="qris.png" width="250" style="border-radius:10px;border:1px solid #ddd;">
</div>

<button onclick="kirimWA()">Konfirmasi Pembayaran via WhatsApp</button>

<div class="link">
<a href="index.html">Pesan Lagi</a>
</div>
</div>

<script>
const url = new URLSearchParams(window.location.search);

let orderId = localStorage.getItem("orderID") || url.get("orderId");
localStorage.setItem("orderID", orderId);

document.getElementById("orderId").innerText = orderId;
document.getElementById("produk").innerText = url.get("product");
document.getElementById("jumlah").innerText = url.get("jumlah");
document.getElementById("username").innerText = url.get("username");
document.getElementById("harga").innerText = url.get("harga");

function kirimWA(){
  const wa = "6282262642007";
  const msg =
`Halo Admin, saya ingin konfirmasi pembayaran
Order ID : ${orderId}
Produk : ${url.get("product")}
Jumlah : ${url.get("jumlah")}
Username/NomorHP : ${url.get("username")}
Total : Rp ${url.get("harga")}
Mohon dicek ya.`;

  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`,'_blank');

  fetch("https://script.google.com/macros/s/AKfycbyzUECu2UKHaZsZlBDkMr_bWlqY1EFXTzUi4P0LOsAI/dev",{
    method:"POST",headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({orderId:orderId,produk:url.get("product"),jumlah:url.get("jumlah"),username:url.get("username"),harga:url.get("harga")})
  });
}
</script>
</body>
</html>
