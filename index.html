<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROJA STORE - Order Produk</title>
<style>
body {font-family:Poppins,Arial,sans-serif;background:#f4f7fc;margin:0;padding:0;}
.container {max-width:600px;margin:40px auto;background:white;padding:25px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
h2 {text-align:center;font-weight:700;margin-bottom:20px;color:#222;}
label {font-weight:600;margin-top:10px;display:block;}
select,input {width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;margin-top:7px;}
button {margin-top:20px;width:100%;padding:14px;background:#007bff;font-size:18px;font-weight:700;color:white;border:none;border-radius:10px;cursor:pointer;}
button:hover {background:#005fcc;}
.price-box {margin-top:12px;padding:10px;background:#eef3ff;border:1px solid #cdd8ff;border-radius:10px;font-size:17px;font-weight:700;text-align:center;color:#004aad;display:none;}
</style>
</head>

<body>
<div class="container">
<h2>Form Order ROJA STORE</h2>

<form id="orderForm">

  <label>Nomor WhatsApp:</label>
  <input type="text" id="whatsapp" required />

  <label>Pilih Produk:</label>
  <select id="produk" required>
    <option value="">-- Pilih Produk --</option>
    <option value="followers-ig">Followers Instagram</option>
    <option value="followers-tt">Followers TikTok</option>
    <option value="likes-ig">Like Instagram</option>
    <option value="likes-tt">Like TikTok</option>
    <option value="app-prem">App Premium</option>
  </select>

  <div id="jumlahBox" style="display:none">
    <label>Pilih Jumlah:</label>
    <select id="jumlah">
      <option value="" disabled selected>-- Pilih Jumlah --</option>
    </select>

    <label>Link Profil:</label>
    <input type="text" id="profil" placeholder="Masukkan link profil">
  </div>

  <div id="appBox" style="display:none">
    <label>Pilih Layanan Premium:</label>
    <select id="appList">
      <option value="" disabled selected>-- Pilih Layanan --</option>
      <option value="Netflix 1 Bulan" data-harga="40000">Netflix 1 Bulan (40K)</option>
      <option value="Spotify Premium 1 Bulan" data-harga="14000">Spotify Premium (14K)</option>
      <option value="Gemini 1 Tahun + 2TB" data-harga="35000">Gemini 1 Tahun + 2TB (35K)</option>
      <option value="YT Premium 1 Bulan" data-harga="10000">YT Premium (10K)</option>
      <option value="Capcut Premium 1 Bulan" data-harga="20000">Capcut Premium (20K)</option>
      <option value="GPT Premium 1 Bulan" data-harga="30000">GPT Premium (30K)</option>
      <option value="Canva Premium 1 Bulan" data-harga="5000">Canva Premium (5K)</option>
    </select>

    <label>Nomor Telepon:</label>
    <input type="text" id="phone" placeholder="Masukkan nomor telepon">
  </div>

  <div class="price-box" id="priceBox">
    Total Bayar: Rp <span id="harga"></span>
  </div>

  <button type="submit">Order Sekarang</button>
</form>
</div>

<script>
const priceList = {
  "followers-ig": {100:11000,200:22000,300:33000,400:44000,500:55000,1000:110000,2000:220000,5000:550000,10000:1100000},
  "followers-tt": {100:10000,200:20000,300:30000,400:40000,500:50000,1000:100000,2000:200000,5000:500000,10000:1000000},
  "likes-ig": {100:5000,200:10000,300:15000,400:20000,500:25000,1000:50000,2000:100000,5000:250000,10000:500000},
  "likes-tt": {100:6000,200:12000,300:18000,400:24000,500:30000,1000:60000,2000:120000,5000:300000,10000:600000}
};

document.getElementById("produk").addEventListener("change", function () {
  const prod = this.value;

  document.getElementById("priceBox").style.display = "none";

  if (prod.includes("followers") || prod.includes("likes")) {
    document.getElementById("jumlahBox").style.display = "block";
    document.getElementById("appBox").style.display = "none";

    let jumlahSelect = document.getElementById("jumlah");
    jumlahSelect.innerHTML = `<option value="" disabled selected>-- Pilih Jumlah --</option>`;

    Object.keys(priceList[prod]).forEach(num => {
      jumlahSelect.innerHTML += `<option value="${num}">${num}</option>`;
    });

  } else {
    document.getElementById("jumlahBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";
  }
});

document.getElementById("jumlah").addEventListener("change", function () {
  const prod = document.getElementById("produk").value;
  const harga = priceList[prod][this.value];
  document.getElementById("priceBox").style.display = "block";
  document.getElementById("harga").textContent = harga.toLocaleString("id-ID");
});

document.getElementById("appList").addEventListener("change", function(){
  const harga = this.options[this.selectedIndex].dataset.harga;
  document.getElementById("priceBox").style.display = "block";
  document.getElementById("harga").textContent = Number(harga).toLocaleString("id-ID");
});

document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  const whatsapp = document.getElementById("whatsapp").value;
  const produk = document.getElementById("produk").value;
  const jumlah = document.getElementById("jumlah").value;
  const profil = document.getElementById("profil").value;
  const harga = document.getElementById("harga").textContent;
  const app = document.getElementById("appList").value;
  const phone = document.getElementById("phone").value;

  window.location.href = `payment.html?whatsapp=${whatsapp}&produk=${produk}&jumlah=${jumlah}&profil=${profil}&harga=${harga}&app=${app}&phone=${phone}`;
});
</script>
</body>
</html>
