<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>
<style>
body {font-family:Arial, sans-serif; background:#f7f7f7; margin:0; padding:20px;}
.container {max-width:450px; margin:auto; background:white; padding:20px; border-radius:12px; text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.15);}
h2{margin-bottom:10px;}
.info{margin:12px 0; font-size:17px;}
button{margin-top:15px; padding:12px; width:100%; border-radius:10px; border:none; background:black; color:white; font-size:18px; font-weight:bold;}
</style>
</head>
<body>

<div class="container">
<h2>Konfirmasi Pembayaran</h2>

<p class="info" id="idOrder"></p>
<p class="info" id="prod"></p>
<p class="info" id="jumlah"></p>
<p class="info" id="username"></p>
<p class="info" id="phone"></p>
<p class="info" id="price"></p>

<img src="qris.png" width="100%" style="border-radius:12px; margin-top:10px;">

<button onclick="window.location.href='index.html'">Pesan Lagi</button>
</div>

<script>
const harga = {
  followers_ig:{100:11000,200:22000,300:33000,400:44000,500:55000,1000:110000,2000:220000,5000:550000,10000:1100000},
  followers_tt:{100:10000,200:20000,300:30000,400:40000,500:50000,1000:100000,2000:200000,5000:500000,10000:1000000},
  likes_ig:{100:5000,200:10000,300:15000,400:20000,500:25000,1000:50000,2000:100000,5000:250000,10000:500000},
  likes_tt:{100:6000,200:12000,300:18000,400:24000,500:30000,1000:60000,2000:120000,5000:300000,10000:600000},
  app_prem:{"1 Bulan":150000}
};

const params = new URLSearchParams(window.location.search);
const product = params.get("product");
const jumlah = params.get("jumlah");
const user = params.get("username");
const phone = params.get("phone");

// *** ID order tetap walaupun refresh ***
if(!localStorage.getItem("ORDERID")){
  const random = Math.floor(100000 + Math.random() * 900000);
  localStorage.setItem("ORDERID", "ROJAID-" + random);
}

const idOrder = localStorage.getItem("ORDERID");

document.getElementById("idOrder").textContent = "ID Pesanan: " + idOrder;
document.getElementById("prod").textContent = "Produk: " + product.replaceAll("_"," ").toUpperCase();
document.getElementById("jumlah").textContent = "Jumlah: " + jumlah;
document.getElementById("username").textContent = product === "app_prem" ? "Nomor HP: " + phone : "Username: " + user;
document.getElementById("phone").textContent = "WhatsApp: " + phone;

const price = product === "app_prem" ? harga.app_prem["1 Bulan"] : harga[product][jumlah];
document.getElementById("price").textContent = "Total Pembayaran: Rp " + price.toLocaleString();
</script>

</body>
</html>
