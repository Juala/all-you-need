<h2>Silakan Lakukan Pembayaran</h2>
<p id="orderDetail"></p>
<img src="qris.png" width="300">

<button id="konfirmasiBtn">Konfirmasi via WhatsApp</button>

<script>
const query = new URLSearchParams(window.location.search);
const product = query.get("product");
const jumlah = query.get("jumlah");
const profil = query.get("profil");
const phone = query.get("phone");

document.getElementById("orderDetail").innerHTML = `
<b>Produk :</b> ${product}<br>
${jumlah ? `<b>Jumlah Followers:</b> ${jumlah}<br>` : ""}
${profil ? `<b>Profil:</b> ${profil}<br>` : ""}
${phone ? `<b>No Telepon:</b> ${phone}<br>` : ""}
`;

document.getElementById("konfirmasiBtn").addEventListener("click", function() {
  const message = encodeURIComponent(
    `Saya sudah melakukan pembayaran\nProduk: ${product}\nJumlah: ${jumlah}\nProfil: ${profil}\nNo HP: ${phone}`
  );

  window.location.href = `https://wa.me/6282262642007?text=${message}`;
});
</script>
