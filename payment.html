<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembayaran</title>
<style>
    body{background:#0e0f12;color:#fff;font-family:"Poppins",sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;}
    .box{background:#141518;padding:32px;width:420px;border-radius:22px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,.4);border:1px solid #2a2d31;}
    h2{font-size:25px;font-weight:700;margin-bottom:10px;}
    img{width:260px;border-radius:14px;margin:14px auto;}
    .price{font-size:26px;font-weight:700;margin-top:10px;}
    .btn{padding:14px;background:#25d366;color:#fff;text-decoration:none;display:block;margin-top:18px;border-radius:14px;font-size:19px;font-weight:600;}
</style>
</head>
<body>

<div class="box">
    <h2>💳 Pembayaran</h2>
    <div class="price" id="price"></div>
    <p>Silakan Scan QRIS untuk membayar</p>
    <img src="qris.png">
    <a id="btnWa" class="btn" target="_blank">Konfirmasi Pembayaran</a>
</div>

<script>
let data = JSON.parse(localStorage.getItem("orderData"));
document.getElementById("price").innerHTML = data.price;

let msg = "";

if(data.service==="followers"){
    msg =
`Halo admin, saya ingin konfirmasi pembayaran.
Produk: Followers Instagram
Jumlah: ${Number(data.followers).toLocaleString("id-ID")}
Link Profil: ${data.link}
Total Pembayaran: ${data.price}

Mohon diproses ya min 🙏`;
}

if(data.service==="premium"){
    msg =
`Halo admin, saya ingin konfirmasi pembayaran.
Produk App Premium
Nomor WA: ${data.phone}
Total Pembayaran: ${data.price}

Mohon diproses ya min 🙏`;
}

document.getElementById("btnWa").href =
"https://wa.me/6282262642007?text=" + encodeURIComponent(msg);
</script>

</body>
</html>
