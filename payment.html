<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konfirmasi Pembayaran - ROJA STORE</title>

<style>
body {font-family: Poppins, Arial, sans-serif; background:#f4f7fc; margin:0; padding:0;}
.container {
  max-width:600px; margin:50px auto; background:white;
  padding:25px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2 {text-align:center; font-weight:700; margin-bottom:20px; color:#222;}
.order-id {text-align:center; font-weight:700; font-size:18px; margin-bottom:10px; color:#004aad;}
.table {width:100%; margin-top:15px; border-collapse:collapse;}
.table td {padding:10px 5px; border-bottom:1px solid #eee;}
.btn {
  width:100%; margin-top:18px; padding:13px; border:none;
  background:#007bff; color:white; font-size:18px; font-weight:700;
  border-radius:10px; cursor:pointer;
}
.btn:hover {background:#005fcc;}
.btn-second {
  width:100%; margin-top:10px; padding:13px; display:block; text-align:center;
  background:#333; font-size:17px; font-weight:700; color:white; text-decoration:none;
  border-radius:10px;
}
.note {text-align:center; margin-top:15px; font-size:14px; color:#777;}
.qris-box {text-align:center; margin-top:20px;}
.qris {width:260px; border-radius:10px; border:1px solid #ddd;}
</style>
</head>

<body>
<div class="container">
<h2>Konfirmasi Pembayaran</h2>

<p id="orderId" class="order-id"></p>

<table class="table">
<tr><td>Produk</td><td id="produk"></td></tr>
<tr><td>Link Profil / Nomor</td><td id="profil"></td></tr>
<tr><td>Jumlah</td><td id="jumlah"></td></tr>
<tr><td>Total Pembayaran</td><td id="harga"></td></tr>
</table>

<div class="qris-box">
<p>Silakan Scan QRIS untuk melanjutkan pembayaran</p>
<img src="qris.png" class="qris">
</div>

<button id="payBtn" class="btn">Konfirmasi Pembayaran via WhatsApp</button>

<a href="index.html" id="newOrder" class="btn-second">Pesan Lagi</a>

<p class="note">*Gunakan Order ID ketika konfirmasi pembayaran</p>
</div>


<script>
// Ambil parameter dari URL
const params = new URLSearchParams(window.location.search);
const produk = params.get("produk");
const profil = params.get("profil") || params.get("phone");
const jumlah = params.get("jumlah") || "-";
const harga = params.get("harga");

// Tampilkan ke UI
document.getElementById("produk").innerText = produk;
document.getElementById("profil").innerText = profil;
document.getElementById("jumlah").innerText = jumlah;
document.getElementById("harga").innerText = "Rp " + harga;

// Generate Order ID
function generateOrderId() {
  return "ROJAID-" + Math.floor(100000 + Math.random() * 900000);
}

let savedID = localStorage.getItem("orderId");
if (!savedID) {
  savedID = generateOrderId();
  localStorage.setItem("orderId", savedID);
}
document.getElementById("orderId").innerText = "ID Pesanan: " + savedID;

// Tombol Konfirmasi WhatsApp
document.getElementById("payBtn").addEventListener("click", () => {
  const waMessage = `Halo Mas, saya ingin konfirmasi pembayaran.\n\nID Pesanan: ${savedID}\nProduk: ${produk}\nJumlah: ${jumlah}\nTotal: Rp ${harga}\nProfil/Nomor: ${profil}`;
  window.location.href = `https://wa.me/6282262642007?text=${encodeURIComponent(waMessage)}`;
});

// Reset ID jika klik "Pesan Lagi"
document.getElementById("newOrder").addEventListener("click", () => {
  localStorage.removeItem("orderId");
});
</script>

</body>
</html>
