<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>
<style>
body { font-family: Arial, sans-serif; background: #f1f3f8; padding: 20px; }
.box { background: white; padding: 20px; border-radius: 10px; max-width: 450px; margin: auto; }
input, button {
  width: 100%; padding: 12px; margin-top: 10px;
  border-radius: 8px; border: 1px solid #ccc;
}
button { background: #28a745; color: white; font-size: 16px; cursor: pointer; }
button:hover { background: #1e7e34; }
</style>
</head>
<body>

<div class="box">
<h2>Konfirmasi Pembayaran</h2>

<p>Produk: <span id="product"></span></p>
<p>Harga: Rp <span id="price"></span></p>

<label>Nomor WhatsApp Pembeli</label>
<input type="number" id="phone" placeholder="Contoh: 6285xxxxxxxx" required>

<button onclick="sendOrder()">Konfirmasi ke Admin</button>
</div>

<script>
// Get selected product data from query URL
const query = new URLSearchParams(window.location.search);
const product = query.get("product");
const price = query.get("price");

document.getElementById("product").innerText = product;
document.getElementById("price").innerText = price;

// SEND DATA + OPEN WHATSAPP
function sendOrder() {
  const phone = document.getElementById("phone").value;
  if (phone === "") { alert("Nomor WhatsApp wajib diisi!"); return; }

  // SEND DATA TO GOOGLE SHEETS
  fetch("https://script.google.com/macros/s/AKfycbyzUECu2UKHaZsZlBDkMr_bWlqY1EFXTzUi4P0LOsAI/dev", {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      product: product,
      price: price,
      phone: phone,
      timestamp: new Date().toLocaleString("id-ID")
    })
  });

  // OPEN WHATSAPP ADMIN WITH MESSAGE
  const message =
`Halo Mas, saya sedang melakukan pesanan:
Produk: ${product}
Harga: Rp ${price}
Nomor WA saya: ${phone}

Mohon segera diproses.`;

  window.location.href = `https://wa.me/6282262642007?text=${encodeURIComponent(message)}`;
}
</script>

</body>
</html>
