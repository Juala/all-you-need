<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | ROJA STORE</title>
<style>
body { font-family:Poppins, Arial, sans-serif; background:#f4f7fc; margin:0; padding:0; }
.container { max-width:500px; margin:50px auto; background:#fff; padding:25px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2 { text-align:center; font-weight:700; color:#2d2d2d; margin-bottom:15px;}
.info-box { margin-top:20px; padding:15px; border-radius:10px; background:#eef3ff; border:1px solid #cdd8ff; }
p { font-size:15px; margin:6px 0; }
.value { font-weight:bold; color:#004aad; }
.qris-box { margin-top:20px; text-align:center; }
.qris-box img { border-radius:10px; border:1px solid #ddd; width:250px; }
button { background:#007bff; width:100%; padding:14px; color:white; border:none; border-radius:10px; font-size:17px; font-weight:600; cursor:pointer; margin-top:18px; }
button:hover { background:#005fcc; }
#btnOrderAgain { background:#28a745; margin-top:10px; }
</style>
</head>
<body>

<div class="container">
  <h2>Konfirmasi Pembayaran</h2>

  <div class="info-box">
    <p><strong>Order ID:</strong> <span id="orderId" class="value"></span></p>
    <p><strong>Produk:</strong> <span id="produk" class="value"></span></p>
    <p><strong>Jumlah:</strong> <span id="jumlah" class="value"></span></p>
    <p><strong>Nomor WhatsApp:</strong> <span id="phone" class="value"></span></p>
    <p><strong>Total Pembayaran:</strong> <span id="harga" class="value"></span></p>
  </div>

  <div class="qris-box">
    <p>Silakan Scan QRIS untuk melanjutkan pembayaran</p>
    <img src="qris.png" alt="QRIS">
  </div>

  <button onclick="kirimWA()">Konfirmasi Pembayaran via WhatsApp</button>
  <button id="btnOrderAgain" onclick="window.location.href='index.html'">Pesan Lagi</button>
</div>

<script>
// Ambil data dari URL
const urlParams = new URLSearchParams(window.location.search);
let orderId = sessionStorage.getItem("orderId");

// Generate Order ID jika belum ada di sessionStorage
if(!orderId){
  const randomNum = Math.floor(100000 + Math.random() * 900000);
  orderId = `ROJAID-${randomNum}`;
  sessionStorage.setItem("orderId", orderId);
}

// Set data ke tampilan
document.getElementById("orderId").textContent = orderId;
document.getElementById("produk").textContent = urlParams.get("product");
document.getElementById("jumlah").textContent = urlParams.get("jumlah");
document.getElementById("phone").textContent = urlParams.get("phone");

// Tentukan harga
const hargaList = {
  followers_ig:{100:11000,200:22000,300:33000,400:44000,500:55000,1000:110000,2000:220000,5000:550000,10000:1100000},
  followers_tt:{100:10000,200:20000,300:30000,400:40000,500:50000,1000:100000,2000:200000,5000:500000,10000:1000000},
  likes_ig:{100:5000,200:10000,300:15000,400:20000,500:25000,1000:50000,2000:100000,5000:250000,10000:500000},
  likes_tt:{100:6000,200:12000,300:18000,400:24000,500:30000,1000:60000,2000:120000,5000:300000,10000:600000},
  app_prem:{
      "Netflix 1 Bulan":40000,
      "Spotify Premium 1 Bulan":14000,
      "Gemini 1 Tahun + 2TB GDrive":35000,
      "Amazon Prime 1 Tahun":7000,
      "YouTube Premium 1 Bulan":10000,
      "Capcut Premium 1 Bulan":20000,
      "Gemini Premium 1 Tahun + 2TB":35000,
      "GPT Premium 1 Bulan":30000,
      "Canva Premium 1 Bulan":5000
  }
};

let product = urlParams.get("product");
let jumlah = urlParams.get("jumlah");
let totalHarga = 0;

if(product === "app_prem"){
  totalHarga = hargaList.app_prem[jumlah] || 0;
}else{
  totalHarga = hargaList[product][jumlah] || 0;
}

document.getElementById("harga").textContent = "Rp " + totalHarga.toLocaleString("id-ID");

// Button WA confirm
function kirimWA(){
  const waNumber = "6282262642007"; 
  const message =
`Halo Admin, saya ingin konfirmasi pembayaran
Order ID: ${orderId}
Produk: ${product}
Jumlah: ${jumlah}
Nomor WhatsApp: ${urlParams.get("phone")}
Total: Rp ${totalHarga.toLocaleString("id-ID")}
Mohon dicek ya.`;

  window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`,"_blank");

  // kirim ke spreadsheet
  fetch("https://script.google.com/macros/s/AKfycbyzUECu2UKHaZsZlBDkMr_bWlqY1EFXTzUi4P0LOsAI/dev", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      orderId: orderId,
      product: product,
      jumlah: jumlah,
      phone: urlParams.get("phone"),
      harga: totalHarga
    })
  });
}
</script>
</body>
</html>
