<script type="module">
// ================== FIREBASE ==================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpj7udfBLEqlloEqidlSJYHt-2icTOGCw",
  authDomain: "database-jualan.firebaseapp.com",
  databaseURL: "https://database-jualan-default-rtdb.firebaseio.com",
  projectId: "database-jualan",
  storageBucket: "database-jualan.firebasestorage.app",
  messagingSenderId: "766732892106",
  appId: "1:766732892106:web:cd223204bfbb529599c133"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================== AMBIL DATA DARI URL ==================
const urlParams = new URLSearchParams(window.location.search);
let orderId = sessionStorage.getItem("orderId");

// Generate Order ID jika belum ada
if(!orderId){
  const randomNum = Math.floor(100000 + Math.random() * 900000);
  orderId = `ROJAID-${randomNum}`;
  sessionStorage.setItem("orderId", orderId);
}

const product = urlParams.get("product");
const jumlah = urlParams.get("jumlah");
const phone = urlParams.get("phone");
const username = urlParams.get("username");
const hargaTotal = urlParams.get("harga");

// Set ke tampilan HTML
document.getElementById("orderId").textContent = orderId;
document.getElementById("produk").textContent = product;
document.getElementById("jumlah").textContent = jumlah;
document.getElementById("phone").textContent = phone;
document.getElementById("harga").textContent = "Rp " + Number(hargaTotal).toLocaleString("id-ID");

if(username && username.trim() !== ""){
  document.getElementById("username").textContent = username;
  document.getElementById("usernameRow").style.display = "block";
}

// ================== FITUR BARU: PUSH DATA TO FIREBASE ==================
function simpanFirebase(){
  push(ref(db, "orders"), {
    orderId: orderId,
    product: product,
    jumlah: jumlah,
    username: username || "-",
    phone: phone,
    harga: Number(hargaTotal),
    status: "Menunggu",
    createdAt: Date.now()
  });
}

// ================== KIRIM WHATSAPP ==================
window.kirimWA = function(){
  simpanFirebase(); // <--- FITUR BARU: SIMPAN SAAT KONFIRMASI

  const waNumber = "6282262642007";
  let message = `Halo Mas, saya ingin konfirmasi pembayaran\nOrder ID: ${orderId}\nProduk: ${product}\nJumlah: ${jumlah}`;
  if(username && username.trim() !== "") message += `\nUsername / Link: ${username}`;
  message += `\nNomor WhatsApp: ${phone}\nTotal: Rp ${Number(hargaTotal).toLocaleString("id-ID")}\nMohon dicek ya.`;

  window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`,"_blank");
}

// ================== PESAN LAGI ==================
window.pesanLagi = function(){
  sessionStorage.removeItem("orderId");
  window.location.href = "index.html";
}
</script>
