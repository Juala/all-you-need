<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ROJA ADMIN - Data Pesanan</title>
<style>
body{font-family:Arial, sans-serif;background:#f0f0f0;padding:20px;margin:0;}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;font-size:14px;}
th{background:#333;color:#fff;}
input{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:1px solid #ccc;}
button{padding:4px 8px;border:none;border-radius:6px;cursor:pointer;background:#e91e63;color:#fff;}
</style>
</head>
<body>

<div class="container">
<h2>📦 Data Pesanan Masuk</h2>

<input type="text" id="search" placeholder="Cari berdasarkan ROJAID-XXXXX">

<table>
<thead>
<tr>
<th>ID Pesanan</th>
<th>Nama</th>
<th>WA</th>
<th>Produk</th>
<th>Total</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpj7udfBLEqlloEqidlSJYHt-2icTOGCw",
  authDomain: "database-jualan.firebaseapp.com",
  databaseURL: "https://database-jualan-default-rtdb.firebaseio.com",
  projectId: "database-jualan",
  storageBucket: "database-jualan.appspot.com",
  messagingSenderId: "766732892106",
  appId: "1:766732892106:web:cd223204bfbb529599c133"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("orderTable");
const search = document.getElementById("search");

let dataOrders = [];

onValue(ref(db, "orders"), (snapshot)=>{
    table.innerHTML = "";
    dataOrders = [];

    snapshot.forEach(child=>{
        dataOrders.push(child.val());
    });

    renderTable(dataOrders);
});

function renderTable(list){
  table.innerHTML = "";
  list.forEach(data=>{
    // Nama hanya untuk followers/likes
    const showNameProducts = ["followers_ig","followers_tt","likes_ig","likes_tt"];
    const nama = showNameProducts.includes(data.produk) ? (data.nama ?? "Username / Link Profil") : "-";

    table.innerHTML += `
    <tr>
        <td>${data.id ?? ""}</td>
        <td>${nama}</td>
        <td>${data.whatsapp ?? ""}</td>
        <td>${data.produk ?? "-"}</td>
        <td>Rp ${Number(data.total ?? 0).toLocaleString("id-ID")}</td>
        <td>
          <select onchange="updateStatus('${data.id}', this.value)">
            <option ${data.status=="Pending"?"selected":""}>Pending</option>
            <option ${data.status=="Proses"?"selected":""}>Proses</option>
            <option ${data.status=="Success"?"selected":""}>Success</option>
            <option ${data.status=="Cancel"?"selected":""}>Cancel</option>
          </select>
        </td>
        <td>
          <button onclick="deleteOrder('${data.id}')">Hapus</button>
        </td>
    </tr>`;
  });
}

search.addEventListener("keyup", ()=>{
  const keyword = search.value.toUpperCase();
  const filtered = dataOrders.filter(item=> item.id.toUpperCase().includes(keyword));
  renderTable(filtered);
});

window.updateStatus = function(id, status){
  update(ref(db, "orders/" + id), {status});
}

window.deleteOrder = function(id){
  if(confirm("Yakin ingin menghapus pesanan ini?")){
    remove(ref(db, "orders/" + id));
  }
}
</script>

</body>
</html>
