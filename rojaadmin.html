<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROJA ADMIN | Kupon Diskon</title>
<style>
body { font-family: Arial, sans-serif; padding:20px; background:#f4f4f4; }
input { width:100%; padding:10px; margin:5px 0; }
button { padding:10px 15px; margin-top:10px; cursor:pointer; }
table{ width:100%; border-collapse:collapse; margin-top:15px }
th,td{ border:1px solid #ccc; padding:8px; text-align:center }
th{ background:#eaeaea }
</style>
</head>
<body>

<h2>Manajemen Kupon Diskon</h2>

<h3>Buat Kupon Baru</h3>
<input id="kodeKupon" placeholder="Kode Kupon contoh: DISKON10">
<input id="nilaiKupon" type="number" placeholder="Nilai potongan contoh: 10000">
<input id="masaKupon" type="date">
<input id="limitKupon" type="number" placeholder="Limit pemakaian (0 = unlimited)">
<button onclick="buatKupon()" style="background:#008000;color:white;">Tambah Kupon</button>

<h3>Daftar Kupon Aktif</h3>
<table>
<thead>
<tr>
<th>Kode</th>
<th>Potongan</th>
<th>Expired</th>
<th>Limit</th>
<th>Used</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="kuponBody"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_DOMAIN.firebaseapp.com",
  databaseURL: "https://ISI.firebaseio.com",
  projectId: "ISI_PROJECT",
  storageBucket: "ISI.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.buatKupon = function(){
  const kode = document.getElementById("kodeKupon").value.toUpperCase();
  const value = Number(document.getElementById("nilaiKupon").value);
  const expires = document.getElementById("masaKupon").value;
  const limit = Number(document.getElementById("limitKupon").value);

  if(!kode || !value) return alert("Isi kode dan nilai!");

  set(ref(db,"coupons/"+kode), {
    value,
    expires: expires || "",
    limit: limit || 0,
    used: 0
  }).then(()=> alert("Kupon dibuat!"));
};

// tampilkan daftar kupon realtime
const kuponBody = document.getElementById("kuponBody");

onValue(ref(db,"coupons"), (snapshot)=>{
  kuponBody.innerHTML="";
  snapshot.forEach(child=>{
    const kode = child.key;
    const data = child.val();

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${kode}</td>
      <td>Rp ${data.value.toLocaleString()}</td>
      <td>${data.expires || "Selamanya"}</td>
      <td>${data.limit == 0 ? "Unlimited" : data.limit}</td>
      <td>${data.used}</td>
      <td><button onclick="hapusKupon('${kode}')" style="background:red;color:white;">Hapus</button></td>
    `;
    kuponBody.appendChild(tr);
  });
});

window.hapusKupon = function(kode){
  if(confirm("Hapus kupon "+kode+"?")){
    remove(ref(db,"coupons/"+kode));
  }
};
</script>

</body>
</html>
