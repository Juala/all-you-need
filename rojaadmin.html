<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROJA ADMIN</title>
<style>
body { font-family:Poppins, Arial; background:#eef2f7; padding:20px; }
h2 { margin-bottom:15px; }
table { width:100%; border-collapse:collapse; background:white; border-radius:10px; overflow:hidden; }
th, td { padding:12px; border-bottom:1px solid #ddd; }
th { background:#263fa9; color:white; }
select { padding:6px; border-radius:6px; }
.status-pending { color:#ff9800; font-weight:bold; }
.status-proses { color:#2196f3; font-weight:bold; }
.status-success { color:#4caf50; font-weight:bold; }
.status-cancel { color:#f44336; font-weight:bold; }
</style>
</head>
<body>

<h2>📦 Data Pesanan Masuk</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>No. WA</th>
<th>Total Bayar</th>
<th>Status</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>

<!-- Firebase Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpj7udfBLEqlloEqidlSJYHt-2icTOGCw",
  authDomain: "database-jualan.firebaseapp.com",
  databaseURL: "https://database-jualan-default-rtdb.firebaseio.com",
  projectId: "database-jualan",
  storageBucket: "database-jualan.firebasestorage.app",
  messagingSenderId: "766732892106",
  appId: "1:766732892106:web:cd223204bfbb529599c133"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("orderTable");

// realtime load orders
onValue(ref(db, "orders"), (snapshot)=>{
    table.innerHTML = "";
    snapshot.forEach(child=>{
        const data = child.val();
        
        table.innerHTML += `
        <tr>
            <td>${data.id}</td>
            <td>${data.nama}</td>
            <td>${data.whatsapp}</td>
            <td>${data.total}</td>
            <td>
                <select data-id="${data.id}" class="statusSelect">
                    <option ${data.status=="Pending"?"selected":""}>Pending</option>
                    <option ${data.status=="Proses"?"selected":""}>Proses</option>
                    <option ${data.status=="Success"?"selected":""}>Success</option>
                    <option ${data.status=="Cancel"?"selected":""}>Cancel</option>
                </select>
            </td>
        </tr>
        `;
    });

    // event change status
    document.querySelectorAll(".statusSelect").forEach(select=>{
        select.addEventListener("change", function(){
            const id = this.getAttribute("data-id");
            const value = this.value;

            update(ref(db, "orders/" + id), {status: value});
        });
    });

});
</script>

</body>
</html>
