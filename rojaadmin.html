<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROJA ADMIN - Data Pesanan</title>
<style>
body{font-family:Arial, sans-serif;background:#f0f0f0;padding:20px;margin:0;}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;font-size:14px;}
th{background:#333;color:#fff;}
button{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:13px;}
.btn-proses{background:#ff9800;color:#fff;}
.btn-selesai{background:#4caf50;color:#fff;}
.btn-hapus{background:#e91e63;color:#fff;}
.status-box{padding:6px 10px;border-radius:6px;font-weight:bold;color:#fff;}
.wait{background:#9c27b0;}
.process{background:#ff9800;}
.done{background:#4caf50;}
</style>
</head>
<body>

<div class="container">
<h2>📦 Data Pesanan Masuk</h2>

<table>
<thead>
<tr>
<th>ID Pesanan</th>
<th>Produk</th>
<th>Jumlah</th>
<th>Username</th>
<th>WA</th>
<th>Harga</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpj7udfBLEqlloEqidlSJYHt-2icTOGCw",
  authDomain: "database-jualan.firebaseapp.com",
  databaseURL: "https://database-jualan-default-rtdb.firebaseio.com",
  projectId: "database-jualan",
  storageBucket: "database-jualan.firebasestorage.app",
  messagingSenderId: "766732892106",
  appId: "1:766732892106:web:cd223204bfbb529599c133",
  measurementId: "G-NFZDMXMPKZ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const table = document.getElementById("orderTable");

onValue(ref(db, "orders"), snapshot =>{
  table.innerHTML = "";
  snapshot.forEach(item =>{
    const data = item.val();
    const key = item.key;

    let statusClass =
      data.status === "Menunggu" ? "wait" :
      data.status === "Proses" ? "process" : "done";

    table.innerHTML += `
      <tr>
        <td>${data.orderId}</td>
        <td>${data.product}</td>
        <td>${data.jumlah}</td>
        <td>${data.username || "-"}</td>
        <td>${data.phone}</td>
        <td>Rp ${data.harga.toLocaleString()}</td>
        <td><span class="status-box ${statusClass}">${data.status}</span></td>
        <td>
          <button class="btn-proses" onclick="setStatus('${key}','Proses')">Proses</button>
          <button class="btn-selesai" onclick="setStatus('${key}','Selesai')">Selesai</button>
          <button class="btn-hapus" onclick="deleteOrder('${key}')">Hapus</button>
        </td>
      </tr>
    `;
  });
});

window.setStatus = function(key,status){
  update(ref(db, "orders/" + key), { status });
};

window.deleteOrder = function(key){
  remove(ref(db, "orders/" + key));
};
</script>

</body>
</html>
