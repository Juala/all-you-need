<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROJA ADMIN - Data Pesanan</title>
<style>
body{font-family:Arial, sans-serif;background:#f0f0f0;padding:20px;margin:0;}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;font-size:14px;}
th{background:#333;color:#fff;}
button{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:13px;}
.btn-proses{background:#ff9800;color:#fff;}
.btn-selesai{background:#4caf50;color:#fff;}
.btn-hapus{background:#e91e63;color:#fff;}
.status-box{padding:6px 10px;border-radius:6px;font-weight:bold;color:#fff;}
.wait{background:#9c27b0;}
.process{background:#ff9800;}
.done{background:#4caf50;}
</style>
</head>
<body>

<div class="container">
<h2>📦 Data Pesanan Masuk</h2>

<table>
<thead>
<tr>
<th>ID Pesanan</th>
<th>Produk</th>
<th>Jumlah</th>
<th>Username</th>
<th>WA</th>
<th>Harga</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>
</div>

<script>
// Load data dari localStorage
function loadOrders(){
  const orders = JSON.parse(localStorage.getItem("orders")) || [];
  const table = document.getElementById("orderTable");
  table.innerHTML="";

  orders.forEach((order,index)=>{
    if(!order.status) order.status="Menunggu";

    let statusClass =
      order.status==="Menunggu" ? "wait" :
      order.status==="Proses" ? "process" : "done";

    table.innerHTML += `
      <tr>
        <td>${order.orderId}</td>
        <td>${order.product}</td>
        <td>${order.jumlah}</td>
        <td>${order.username || "-"}</td>
        <td>${order.phone}</td>
        <td>Rp ${order.harga.toLocaleString()}</td>
        <td><span class="status-box ${statusClass}">${order.status}</span></td>
        <td>
          <button class="btn-proses" onclick="updateStatus(${index}, 'Proses')">Proses</button>
          <button class="btn-selesai" onclick="updateStatus(${index}, 'Selesai')">Selesai</button>
          <button class="btn-hapus" onclick="deleteOrder(${index})">Hapus</button>
        </td>
      </tr>
    `;
  });
}

// Ubah status pesanan
function updateStatus(index,newStatus){
  const orders = JSON.parse(localStorage.getItem("orders"));
  orders[index].status = newStatus;
  localStorage.setItem("orders", JSON.stringify(orders));
  loadOrders();
}

// Hapus pesanan
function deleteOrder(index){
  const orders = JSON.parse(localStorage.getItem("orders"));
  orders.splice(index,1);
  localStorage.setItem("orders", JSON.stringify(orders));
  loadOrders();
}

loadOrders();
</script>

</body>
</html>
