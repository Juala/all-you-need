<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROJA ADMIN - Data Pesanan</title>
<style>
body{font-family:Arial, sans-serif;background:#f0f0f0;padding:20px;margin:0;}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;font-size:14px;}
th{background:#333;color:#fff;}
select{padding:6px;border-radius:6px;font-weight:bold;}
.pending{color:#ff9800;}
.proses{color:#2196f3;}
.success{color:#4caf50;}
.cancel{color:#e91e63;}
</style>
</head>
<body>

<div class="container">
<h2>📦 Data Pesanan Masuk</h2>

<table>
<thead>
<tr>
<th>ID Pesanan</th>
<th>Nama</th>
<th>WA</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpj7udfBLEqlloEqidlSJYHt-2icTOGCw",
  authDomain: "database-jualan.firebaseapp.com",
  databaseURL: "https://database-jualan-default-rtdb.firebaseio.com",
  projectId: "database-jualan",
  storageBucket: "database-jualan.firebasestorage.app",
  messagingSenderId: "766732892106",
  appId: "1:766732892106:web:cd223204bfbb529599c133"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("orderTable");

// Realtime load data Firebase
onValue(ref(db, "orders"), (snapshot)=>{
    table.innerHTML = "";

    snapshot.forEach(child=>{
        const data = child.val();

        // fallback agar tidak undefined
        const id = data.id || "-";
        const nama = data.nama || "-";
        const wa = data.whatsapp || "-";
        const total = data.total ? "Rp " + Number(data.total).toLocaleString("id-ID") : "Rp 0";
        const status = data.status || "Pending";

        table.innerHTML += `
        <tr>
            <td>${id}</td>
            <td>${nama}</td>
            <td>${wa}</td>
            <td>${total}</td>
            <td>
                <select data-id="${id}">
                    <option ${status=="Pending"?"selected":""}>Pending</option>
                    <option ${status=="Proses"?"selected":""}>Proses</option>
                    <option ${status=="Success"?"selected":""}>Success</option>
                    <option ${status=="Cancel"?"selected":""}>Cancel</option>
                </select>
            </td>
        </tr>
        `;
    });

    document.querySelectorAll("select").forEach(select=>{
      select.addEventListener("change", function(){
        const orderId = this.dataset.id;
        const statusUpdate = this.value;
        update(ref(db, "orders/" + orderId), {status: statusUpdate});
      });
    });
});
</script>

</body>
</html>
