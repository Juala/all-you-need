<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard Orders</title>
<style>
body { font-family:Poppins, Arial; background:#f1f3f9; padding:30px; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:10px; text-align:left; }
th { background:#007bff; color:white; }
tr:nth-child(even) { background:#f7f7f7; }
</style>
</head>
<body>
<h2>📦 Pesanan Masuk</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>WhatsApp</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpj7udfBLEqlloEqidlSJYHt-2icTOGCw",
  authDomain: "database-jualan.firebaseapp.com",
  databaseURL: "https://database-jualan-default-rtdb.firebaseio.com",
  projectId: "database-jualan",
  storageBucket: "database-jualan.firebasestorage.app",
  messagingSenderId: "766732892106",
  appId: "1:766732892106:web:cd223204bfbb529599c133"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("orderTable");

onValue(ref(db, "orders"), (snapshot)=>{
    table.innerHTML = "";
    snapshot.forEach(child=>{
        const data = child.val();
        table.innerHTML += `
        <tr>
            <td>${data.id}</td>
            <td>${data.nama}</td>
            <td>${data.whatsapp}</td>
            <td>${data.total}</td>
            <td>${data.status}</td>
        </tr>`;
    });
});
</script>

</body>
</html>
