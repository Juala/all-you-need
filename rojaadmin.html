<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | ROJA STORE</title>
<style>
body { font-family:Arial, sans-serif; background:#f4f7fc; padding:20px; }
.container { max-width:900px; margin:auto; background:#fff; padding:25px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
h2 { text-align:center; margin-bottom:20px; }

input {
  width:100%; padding:12px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px;
}

table { width:100%; border-collapse:collapse; margin-top:15px; }
table, th, td { border:1px solid #ddd; }
th { background:#007bff; color:white; padding:10px; }
td { padding:8px; text-align:center; font-size:14px; }
tr:hover { background:#eef5ff; }
</style>
</head>
<body>

<div class="container">
  <h2>ADMIN PANEL - ROJA STORE</h2>

  <input type="text" id="search" placeholder="Cari Order ID (contoh: ROJAID-123456)" onkeyup="searchOrder()">

  <table>
    <thead>
      <tr>
        <th>Order ID</th>
        <th>Produk</th>
        <th>Jumlah</th>
        <th>Username / Link</th>
        <th>WhatsApp</th>
        <th>Harga</th>
      </tr>
    </thead>
    <tbody id="orderTable"></tbody>
  </table>
</div>

<script>
// Ambil data dari Google Sheets Apps Script JSON
fetch("https://script.google.com/macros/s/AKfycbyzUECu2UKHaZsZlBDkMr_bWlqY1EFXTzUi4P0LOsAI/dev")
  .then(res => res.json())
  .then(data => {
    const table = document.getElementById("orderTable");
    data.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.orderId}</td>
        <td>${row.product}</td>
        <td>${row.jumlah}</td>
        <td>${row.username}</td>
        <td>${row.phone}</td>
        <td>Rp ${Number(row.harga).toLocaleString("id-ID")}</td>
      `;
      table.appendChild(tr);
    });
  });

// Fungsi search
function searchOrder() {
  const filter = document.getElementById("search").value.toUpperCase();
  const rows = document.querySelectorAll("#orderTable tr");

  rows.forEach(row => {
    const cell = row.getElementsByTagName("td")[0];
    if(cell && cell.textContent.toUpperCase().indexOf(filter) > -1){
      row.style.display = "";
    } else {
      row.style.display = "none";
    }
  });
}
</script>

</body>
</html>
